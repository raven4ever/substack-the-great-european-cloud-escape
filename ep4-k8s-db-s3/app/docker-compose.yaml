services:
  postgres:
    image: postgres:17-alpine
    container_name: ep4-postgres
    environment:
      POSTGRES_USER: demo
      POSTGRES_PASSWORD: demo
      POSTGRES_DB: demo
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U demo -d demo" ]
      interval: 5s
      timeout: 5s
      retries: 10

  localstack:
    image: localstack/localstack:4
    container_name: ep4-localstack
    environment:
      SERVICES: s3
      DEBUG: "0"
      AWS_DEFAULT_REGION: us-east-1
    ports:
      - "4566:4566"
    volumes:
      - ./localstack-init:/etc/localstack/init/ready.d:ro
    healthcheck:
      test: [ "CMD-SHELL", "awslocal s3 ls s3://animal-images" ]
      interval: 5s
      timeout: 5s
      retries: 20

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ep4-app
    depends_on:
      postgres:
        condition: service_healthy
      localstack:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/demo
      SPRING_DATASOURCE_USERNAME: demo
      SPRING_DATASOURCE_PASSWORD: demo
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      AWS_REGION: us-east-1
      AWS_S3_ENDPOINT: http://localstack:4566
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      APP_BUCKET_NAME: animal-images
    ports:
      - "8080:8080"
