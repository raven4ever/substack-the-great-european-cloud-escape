apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "my-animalz.fullname" . }}
  labels:
    {{- include "my-animalz.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "my-animalz.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "my-animalz.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "my-animalz.serviceAccountName" . }}
      containers:
        - name: app
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.targetPort }}
              protocol: TCP
          env:
            - name: SPRING_DATASOURCE_URL
              value: {{ .Values.env.datasource.url | quote }}
            - name: SPRING_DATASOURCE_USERNAME
              value: {{ .Values.env.datasource.username | quote }}
            - name: SPRING_DATASOURCE_PASSWORD
              value: {{ .Values.env.datasource.password | quote }}
            - name: SPRING_JPA_HIBERNATE_DDL_AUTO
              value: {{ .Values.env.jpa.ddlAuto | quote }}
            - name: APP_BUCKET_NAME
              value: {{ .Values.env.app.bucketName | quote }}
            - name: APP_RANDOM_IMAGE_URL
              value: {{ .Values.env.app.randomImageUrl | quote }}
            {{- range .Values.extraEnv }}
            - name: {{ .name }}
              value: {{ .value | quote }}
            {{- end }}
          readinessProbe:
            httpGet:
              path: {{ .Values.probes.readiness.path }}
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: {{ .Values.probes.liveness.path }}
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
