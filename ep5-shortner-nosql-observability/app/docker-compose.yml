# Local-dev Compose for the Go URL-shortener.
#
# Profiles:
#   (default)   app + mongo            -> docker compose up
#   dynamo      app-dynamo + dynamodb  -> docker compose --profile dynamo up
#
# Notes:
# - The runtime image is `scratch` (no shell, no wget, no curl) and the binary
#   does not expose a CLI healthcheck flag. There is no clean way to define a
#   container-side healthcheck for `app`, so it is intentionally omitted.
#   Compose ordering is delegated to the storage service's healthcheck via
#   `depends_on: condition: service_healthy` (mongo) or
#   `condition: service_completed_successfully` (dynamodb-init).
# - No top-level `version:` key on purpose: modern Compose ignores it and warns.
# - No OTel collector here: tracing defaults to `none` locally; cloud envs
#   (CloudWatch / Cockpit) own observability backends.

x-app-common: &app-common
  build:
    context: .
    dockerfile: Dockerfile
  image: shortner-app:dev
  ports:
    - "8080:8080"
  restart: unless-stopped
  environment: &app-common-env
    PORT: "8080"
    LOG_LEVEL: debug
    DEFAULT_TTL: 24h
    APP_NAME: shortner-app
    APP_VERSION: dev
    TRACE_EXPORTER: none
    CHAOS_RATE: "0"
    HEARTBEAT_INTERVAL: 30s
    HEARTBEAT_PAYLOAD_KB: "1"

services:
  # ---------------------------------------------------------------------------
  # Default profile: MongoDB-backed app
  # ---------------------------------------------------------------------------
  app:
    <<: *app-common
    container_name: shortner-app
    environment:
      <<: *app-common-env
      STORAGE_KIND: mongodb
      MONGODB_URI: mongodb://mongo:27017
      MONGODB_DATABASE: shortner
      MONGODB_COLLECTION: links
    depends_on:
      mongo:
        condition: service_healthy

  mongo:
    image: mongo:latest
    container_name: shortner-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  # ---------------------------------------------------------------------------
  # `dynamo` profile: DynamoDB-Local-backed app
  # ---------------------------------------------------------------------------
  app-dynamo:
    <<: *app-common
    profiles: ["dynamo"]
    container_name: shortner-app-dynamo
    environment:
      <<: *app-common-env
      STORAGE_KIND: dynamodb
      DYNAMODB_TABLE: shortner-links
      DYNAMODB_REGION: us-east-1
      AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: dummy
      AWS_SECRET_ACCESS_KEY: dummy
      # AWS SDK v2 honors per-service endpoint overrides via this env var.
      AWS_ENDPOINT_URL_DYNAMODB: http://dynamodb-local:8000
    depends_on:
      dynamodb-init:
        condition: service_completed_successfully

  dynamodb-local:
    image: amazon/dynamodb-local:latest
    profiles: ["dynamo"]
    container_name: shortner-dynamodb-local
    restart: unless-stopped
    # `-sharedDb` keeps a single shared DB file across clients; `-dbPath` points
    # it at the persistent volume. The image runs as user `dynamodblocal` (uid
    # 1000); the named volume inherits ownership on first write.
    command: ["-jar", "DynamoDBLocal.jar", "-sharedDb", "-dbPath", "/home/dynamodblocal/data"]
    user: "1000"
    working_dir: /home/dynamodblocal
    ports:
      - "8000:8000"

  # One-shot init: create the `shortner-links` table and enable TTL on
  # `expires_at`. Idempotent: skips create if the table already exists.
  dynamodb-init:
    image: amazon/aws-cli:latest
    profiles: ["dynamo"]
    container_name: shortner-dynamodb-init
    depends_on:
      - dynamodb-local
    environment:
      AWS_ACCESS_KEY_ID: dummy
      AWS_SECRET_ACCESS_KEY: dummy
      AWS_REGION: us-east-1
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -eu
        ENDPOINT="http://dynamodb-local:8000"
        TABLE="shortner-links"

        # Wait for DynamoDB Local to accept connections.
        for i in $$(seq 1 30); do
          if aws --endpoint-url "$$ENDPOINT" dynamodb list-tables >/dev/null 2>&1; then
            break
          fi
          echo "waiting for dynamodb-local... ($$i)"
          sleep 1
        done

        if aws --endpoint-url "$$ENDPOINT" dynamodb describe-table --table-name "$$TABLE" >/dev/null 2>&1; then
          echo "table $$TABLE already exists, skipping create"
        else
          echo "creating table $$TABLE"
          aws --endpoint-url "$$ENDPOINT" dynamodb create-table \
            --table-name "$$TABLE" \
            --attribute-definitions AttributeName=slug,AttributeType=S \
            --key-schema AttributeName=slug,KeyType=HASH \
            --billing-mode PAY_PER_REQUEST
          aws --endpoint-url "$$ENDPOINT" dynamodb wait table-exists --table-name "$$TABLE"
        fi

        # update-time-to-live errors if TTL is already enabled with the same
        # attribute, so guard with describe-time-to-live.
        TTL_STATUS=$$(aws --endpoint-url "$$ENDPOINT" dynamodb describe-time-to-live \
          --table-name "$$TABLE" \
          --query 'TimeToLiveDescription.TimeToLiveStatus' --output text 2>/dev/null || echo NONE)
        if [ "$$TTL_STATUS" != "ENABLED" ] && [ "$$TTL_STATUS" != "ENABLING" ]; then
          echo "enabling TTL on expires_at"
          aws --endpoint-url "$$ENDPOINT" dynamodb update-time-to-live \
            --table-name "$$TABLE" \
            --time-to-live-specification "Enabled=true, AttributeName=expires_at"
        else
          echo "TTL already $$TTL_STATUS"
        fi

        echo "dynamodb-init done"
